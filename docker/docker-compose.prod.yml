# Stack de PRODUCCIÓN para el VPS de Hostinger. Ejecutar desde la raíz del repo:
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Requiere un archivo .env en la raíz (ver .env.example) con secrets reales.

services:
  postgres:
    image: postgres:16-alpine
    container_name: yerbatapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yerbatapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      POSTGRES_DB: yerbatapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yerbatapp']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
    container_name: yerbatapp-server
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://yerbatapp:${POSTGRES_PASSWORD}@postgres:5432/yerbatapp?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    networks: [internal]

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://tudominio.com/api/v1}
    container_name: yerbatapp-client
    restart: unless-stopped
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    container_name: yerbatapp-nginx
    restart: unless-stopped
    depends_on: [server, client]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks: [internal]

  certbot:
    image: certbot/certbot
    container_name: yerbatapp-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

networks:
  internal:

volumes:
  postgres_data:
  uploads_data:
  backups_data:
  certbot_www:
  certbot_certs:
