# Nginx interno del contenedor "client": sirve la SPA con fallback a index.html.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # El service worker y su manifest deben revalidarse siempre: si se cachean
    # de forma agresiva, los clientes quedan pegados a una versión vieja del SW
    # y el prompt de actualización de la app nunca llega a dispararse.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        expires off;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
        expires off;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        expires off;
    }

    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
