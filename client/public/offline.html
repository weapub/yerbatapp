<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f3d2e" />
    <title>Sin conexión — YerbatApp</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #f9fafb;
        color: #111827;
        text-align: center;
        padding: 2rem;
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #0f3d2e;
        color: #8bc34a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0;
      }
      p {
        margin: 0;
        color: #6b7280;
        max-width: 24rem;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.6rem 1.25rem;
        border-radius: 0.5rem;
        border: none;
        background: #0f3d2e;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #030712; color: #f3f4f6; }
        p { color: #9ca3af; }
      }
    </style>
  </head>
  <body>
    <div class="badge">Y</div>
    <h1>Sin conexión a internet</h1>
    <p>
      Esta pantalla todavía no está disponible sin conexión. Las secciones que ya
      visitaste siguen funcionando con los últimos datos guardados.
    </p>
    <button onclick="location.reload()">Reintentar</button>
  </body>
</html>
